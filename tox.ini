[tox]
isolated_build = true
skipsdist = true
usedevelop = true

[testenv]
setenv =
    DJANGO_SETTINGS_MODULE = tests.test_settingsAA4
deps=
    allianceauth @ git+https://gitlab.com/allianceauth/allianceauth.git
    bravado
    coverage

install_command = pip install -e ".[test]" -U {opts} {packages}

commands=
    coverage run runtests.py corptools -v 2 --debug-mode
    pip list
    coverage xml
    coverage html
    coverage report -m
